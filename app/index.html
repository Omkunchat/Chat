    <script>
        window.toggleSidebar = function() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isOpen = !sidebar.classList.contains('-translate-x-full');

            if (isOpen) {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
                overlay.style.opacity = '0';
            } else {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.style.opacity = '1', 10);
            }
        }

        let isDesktopCollapsed = false;

        window.toggleDesktopSidebar = function(forceState = null) {
            if (window.innerWidth < 768) return; 
            
            if (forceState !== null) {
                isDesktopCollapsed = forceState;
            } else {
                isDesktopCollapsed = !isDesktopCollapsed;
            }

            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const toggleIcon = document.getElementById('desktop-toggle-icon');
            const navTexts = document.querySelectorAll('.nav-text');
            const sectionTitles = document.querySelectorAll('.section-title');
            const navBadges = document.querySelectorAll('.nav-badge');
            const logoContainer = document.getElementById('sidebar-logo-container');

            if (isDesktopCollapsed) {
                sidebar.classList.add('desktop-collapsed');
                sidebar.classList.remove('w-[260px]');
                sidebar.classList.add('w-[80px]');
                
                mainContent.classList.remove('md:ml-[260px]');
                mainContent.classList.add('md:ml-[80px]');
                
                toggleIcon.classList.remove('fa-chevron-left');
                toggleIcon.classList.add('fa-chevron-right');
                
                navTexts.forEach(el => el.style.opacity = '0');
                sectionTitles.forEach(el => el.style.opacity = '0');
                navBadges.forEach(el => el.style.opacity = '0');
                logoContainer.style.opacity = '0';
                
            } else {
                sidebar.classList.remove('desktop-collapsed');
                sidebar.classList.remove('w-[80px]');
                sidebar.classList.add('w-[260px]');
                
                mainContent.classList.remove('md:ml-[80px]');
                mainContent.classList.add('md:ml-[260px]');
                
                toggleIcon.classList.remove('fa-chevron-right');
                toggleIcon.classList.add('fa-chevron-left');
                
                setTimeout(() => {
                    navTexts.forEach(el => el.style.opacity = '1');
                    sectionTitles.forEach(el => el.style.opacity = '1');
                    navBadges.forEach(el => el.style.opacity = '1');
                    logoContainer.style.opacity = '1';
                }, 150); 
            }
        }

        window.addEventListener('hashchange', updateActiveState);
        
        function updateActiveState() {
            const hash = window.location.hash || '#dashboard';
            const sidebarLinks = document.querySelectorAll('.nav-item');
            const headerTitle = document.getElementById('header-title');

            if (hash === '#inbox' && window.innerWidth >= 768) {
                window.toggleDesktopSidebar(true); 
            } else if (hash !== '#inbox' && window.innerWidth >= 768) {
                window.toggleDesktopSidebar(false); 
            }

            sidebarLinks.forEach(link => {
                const linkHash = link.getAttribute('href');
                if (linkHash === hash) {
                    link.classList.add('active-nav');
                    link.classList.remove('text-slate-600', 'hover:bg-slate-50');
                    if (headerTitle) headerTitle.textContent = link.getAttribute('data-title');
                } else {
                    link.classList.remove('active-nav');
                    link.classList.add('text-slate-600', 'hover:bg-slate-50');
                }
            });
            
            const bottomLinks = document.querySelectorAll('.nav-item-bottom');
            bottomLinks.forEach(link => {
                 if(link.getAttribute('href') === hash) {
                     link.classList.add('text-blue-600');
                     link.classList.remove('text-slate-400');
                 } else {
                     link.classList.remove('text-blue-600');
                     link.classList.add('text-slate-400');
                 }
            });

            if (window.innerWidth < 768 && !document.getElementById('sidebar').classList.contains('-translate-x-full')) {
                toggleSidebar();
            }
        }

        let lastScrollTop = 0;
        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            const bottomNav = document.getElementById('bottom-nav');
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            
            if (scrollTop > lastScrollTop && scrollTop > 50) {
                header.style.transform = 'translateY(-100%)';
                if(bottomNav) bottomNav.style.transform = 'translateY(150%)'; 
            } else {
                header.style.transform = 'translateY(0)';
                if(bottomNav) bottomNav.style.transform = 'translateY(0)';
            }
            lastScrollTop = scrollTop;
        });

        document.addEventListener('DOMContentLoaded', updateActiveState);
        
        // 🚀 UPDATED FCM REGISTRATION CODE
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        // 'sw.js' ko badal kar 'firebase-messaging-sw.js' kiya gaya hai
        // Dhyan dein: Shuruat mein '/' nahi hai taaki aapke local folder mein 404 na aaye
        navigator.serviceWorker.register('firebase-messaging-sw.js').then(function(registration) {
            console.log('✅ FCM ServiceWorker registered! Scope:', registration.scope);
        }).catch(function(err) {
            console.error('❌ ServiceWorker registration failed:', err);
        });
    });
}
    </script>
