<div class="w-full max-w-7xl mx-auto space-y-4 animate-fade-in pb-24 relative">
    
    <div class="flex items-center gap-4 mb-6">
        <a href="#catalog" class="w-10 h-10 rounded-2xl bg-white border border-slate-200 text-slate-500 flex items-center justify-center hover:bg-slate-50 transition-colors shadow-sm active:scale-95 shrink-0">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div>
            <h2 id="page-title" class="text-2xl font-extrabold text-slate-800 tracking-tight">Add New Item</h2>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Train your AI to sell this item</p>
        </div>
    </div>

    <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col md:flex-row">
        
        <div class="w-full md:w-2/5 bg-slate-50 p-6 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-slate-200">
            <label class="w-full text-center text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Item Image</label>
            <div class="w-full max-w-[250px] aspect-square bg-white border-2 border-dashed border-slate-300 hover:border-purple-400 rounded-3xl flex flex-col items-center justify-center text-slate-400 overflow-hidden relative group transition-colors cursor-pointer shadow-sm">
                <img id="imagePreview" src="" class="absolute inset-0 w-full h-full object-cover hidden z-10 transition-opacity duration-300">
                <div class="absolute inset-0 flex flex-col items-center justify-center group-hover:text-purple-500 transition-colors z-0">
                    <i class="fa-solid fa-cloud-arrow-up text-4xl mb-3"></i>
                    <span class="text-[9px] font-black uppercase tracking-widest text-center px-4" id="upload-text">Upload Media</span>
                </div>
                <input type="file" id="aws-image-upload" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20" onchange="window.handleAWSUpload(event)">
            </div>
            <input type="hidden" id="productImage">
            <p class="text-[9px] text-slate-400 font-bold mt-4 text-center uppercase tracking-widest flex items-center justify-center gap-1.5">
                <i class="fa-brands fa-aws text-sm"></i> Secure S3 Storage
            </p>
        </div>

        <div class="w-full md:w-3/5 p-6 md:p-8">
            <form id="productForm" onsubmit="window.handleSaveProduct(event)" class="space-y-5">
                <input type="hidden" id="editProductId">

                <div class="flex gap-4 mb-2">
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="itemType" value="product" class="peer sr-only" checked>
                        <div class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-center peer-checked:bg-white peer-checked:border-blue-500 peer-checked:text-blue-600 peer-checked:shadow-sm text-slate-500 transition-all">
                            <i class="fa-solid fa-box text-sm"></i> <span class="text-[10px] font-black uppercase tracking-widest ml-1">Product</span>
                        </div>
                    </label>
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="itemType" value="service" class="peer sr-only">
                        <div class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-center peer-checked:bg-white peer-checked:border-purple-500 peer-checked:text-purple-600 peer-checked:shadow-sm text-slate-500 transition-all">
                            <i class="fa-solid fa-bell-concierge text-sm"></i> <span class="text-[10px] font-black uppercase tracking-widest ml-1">Service</span>
                        </div>
                    </label>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5 ml-1 tracking-widest">Item / Service Name</label>
                    <input type="text" id="productName" required placeholder="E.G. CLASSIC WHITE SNEAKERS OR DOCTOR CONSULTATION" 
                        class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl font-black text-sm text-slate-800 outline-none focus:ring-2 focus:ring-purple-500 transition-all uppercase placeholder:text-slate-300">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5 ml-1 tracking-widest">Selling Price (₹)</label>
                        <input type="number" id="productPrice" required placeholder="0" 
                            class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl font-black text-base text-slate-800 outline-none focus:ring-2 focus:ring-purple-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5 ml-1 tracking-widest">MRP / Compare at (₹)</label>
                        <input type="number" id="productComparePrice" placeholder="Optional" 
                            class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl font-black text-base text-slate-800 outline-none focus:ring-2 focus:ring-purple-500 transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5 ml-1 tracking-widest">Category</label>
                        <input type="text" id="productCategory" required placeholder="E.G. SHOES" 
                            class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl font-black text-xs text-slate-800 outline-none focus:ring-2 focus:ring-purple-500 transition-all uppercase placeholder:text-slate-300">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5 ml-1 tracking-widest">SKU / Item Code</label>
                        <input type="text" id="productSku" placeholder="E.G. SH-001 (Optional)" 
                            class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl font-black text-xs text-slate-800 outline-none focus:ring-2 focus:ring-purple-500 transition-all uppercase placeholder:text-slate-300">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5 ml-1 tracking-widest">Variants (Sizes / Weights / Options)</label>
                    <input type="text" id="productVariants" placeholder="e.g. S, M, L, XL OR 500g, 1kg OR 30 mins, 1 hr" 
                        class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-xs text-slate-800 outline-none focus:ring-2 focus:ring-purple-500 transition-all placeholder:text-slate-300">
                    <p class="text-[9px] text-slate-400 font-bold mt-1.5 ml-1 uppercase tracking-widest">Comma separated. AI will ask user to pick one before ordering.</p>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5 ml-1 tracking-widest flex justify-between items-center">
                        <span>AI Selling Context & Details</span>
                        <span class="text-purple-500"><i class="fa-solid fa-sparkles"></i> AI Brain</span>
                    </label>
                    <textarea id="productDesc" required rows="3" placeholder="Describe features, uses, and why customers should buy this. AI will use this text to chat with customers." 
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl font-medium text-xs text-slate-700 outline-none focus:ring-2 focus:ring-purple-500 transition-all resize-none leading-relaxed placeholder:text-slate-300 custom-scrollbar"></textarea>
                </div>
                
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-200 mt-2">
                    <div>
                        <h4 class="text-xs font-black text-slate-800 uppercase tracking-widest">In Stock / Active</h4>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider mt-1">If disabled, AI says it's unavailable</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="productStock" class="sr-only peer" checked>
                        <div class="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500 shadow-sm"></div>
                    </label>
                </div>

                <div class="pt-4 border-t border-slate-100 flex gap-3 justify-end">
                    <a href="#catalog" class="px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest text-slate-500 hover:bg-slate-50 transition flex items-center justify-center">Cancel</a>
                    <button type="submit" id="btn-save-product" class="px-8 py-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl shadow-slate-200 hover:bg-black transition transform active:scale-95 flex items-center gap-2">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Save & Train AI
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
.custom-scrollbar::-webkit-scrollbar { width: 4px; }
.custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
</style>
