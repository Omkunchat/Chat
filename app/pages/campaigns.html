<div id="campaigns-wrapper" class="w-full max-w-[95rem] mx-auto space-y-4 animate-fade-in pb-24 relative">

    <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden mt-2">
        <div class="p-4 flex flex-row justify-between items-center">
            <div>
                <h2 class="text-lg font-black text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-bullhorn text-blue-600"></i> Broadcast Campaigns
                </h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Smart Interactive WhatsApp Retargeting</p>
            </div>
            
            <div class="flex items-center gap-2">
                <button id="btn-new-campaign" onclick="window.location.hash='#send-campaigns'" class="bg-slate-900 text-white px-5 py-2.5 rounded-2xl shadow-xl hover:bg-black transition-all active:scale-95 flex items-center gap-2">
                    <i class="fas fa-paper-plane text-xs"></i> 
                    <span class="text-[10px] font-black uppercase tracking-widest hidden md:inline">New Broadcast</span>
                    <span class="text-[10px] font-black uppercase tracking-widest md:hidden">Create</span>
                </button>
            </div>
        </div>
    </div>

    <div id="meta-health-dashboard"></div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-1 bg-gradient-to-r from-blue-600 to-blue-800 p-6 rounded-[2rem] shadow-xl text-white relative overflow-hidden group">
            <div class="relative z-10">
                <p class="text-blue-200 text-[10px] font-black uppercase tracking-[0.2em] mb-2">Total Delivered</p>
                <h3 id="display-total-sent" class="text-5xl font-black mb-4 tracking-tight">0</h3>
                <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-xl bg-white/10 backdrop-blur-md text-[10px] font-black uppercase tracking-widest text-blue-100 border border-white/10">
                    <i class="fas fa-check-double"></i> Messages Sent
                </div>
            </div>
            <i class="fa-solid fa-comment-sms absolute -right-6 -bottom-6 text-[120px] text-white/10 rotate-12 transition-transform group-hover:scale-110"></i>
        </div>

        <div class="md:col-span-1 bg-slate-900 p-6 rounded-[2rem] shadow-xl text-white relative overflow-hidden group">
            <div class="relative z-10">
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-2">Active Campaigns</p>
                <h3 id="display-active-campaigns" class="text-5xl font-black mb-4 tracking-tight text-emerald-400">0</h3>
                <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-xl bg-emerald-500/10 backdrop-blur-md text-[10px] font-black uppercase tracking-widest text-emerald-400 border border-emerald-500/20">
                    <i class="fas fa-rocket"></i> Broadcasts Run
                </div>
            </div>
            <i class="fa-solid fa-chart-simple absolute -right-6 -bottom-6 text-[120px] text-white/5 -rotate-12 transition-transform group-hover:scale-110"></i>
        </div>

        <div class="md:col-span-1 bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm relative overflow-hidden group flex flex-col justify-between">
            <div>
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-2">Audience Reach</p>
                <h3 id="display-audience-reach" class="text-3xl font-black text-slate-900 tracking-tight">0</h3>
                <p class="text-[10px] font-bold text-blue-500 mt-1 flex items-center gap-1"><i class="fa-solid fa-users"></i> Unique Contacts Pinged</p>
            </div>
            <i class="fa-solid fa-satellite-dish absolute -right-6 -top-6 text-[100px] text-slate-50 transition-transform group-hover:rotate-12"></i>
        </div>
    </div>

    <div class="bg-white rounded-3xl border border-slate-200 shadow-sm flex flex-col min-h-[500px] overflow-hidden">
        <div class="p-3 border-b border-slate-100 flex flex-col md:flex-row gap-4 justify-between items-center bg-slate-50/30">
            <div class="relative w-full md:w-96">
                <i class="fas fa-search absolute left-4 top-3.5 text-slate-400 text-xs"></i>
                <input type="text" id="campaignSearchInput" onkeyup="window.handleCampaignSearch()" placeholder="SEARCH CAMPAIGNS..." 
                    class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-[10px] font-black uppercase tracking-wider outline-none focus:border-blue-500 transition shadow-sm placeholder:text-slate-300">
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <select id="campaignStatusFilter" onchange="window.handleCampaignSearch()" class="w-full md:w-auto bg-white border border-slate-200 text-slate-600 text-[10px] font-black uppercase tracking-widest px-4 py-3 rounded-2xl outline-none focus:border-blue-500 cursor-pointer shadow-sm">
                    <option value="all">All Campaigns</option>
                    <option value="sent">Completed</option>
                    <option value="scheduled">Scheduled</option>
                </select>
            </div>
        </div>
        
        <div class="hidden md:grid grid-cols-12 gap-4 px-6 py-3 bg-slate-50 border-b border-slate-100 text-[9px] font-black text-slate-400 uppercase tracking-widest">
            <div class="col-span-4">Campaign Details</div>
            <div class="col-span-4 text-center">Audience & Analytics</div>
            <div class="col-span-2 text-center">Status</div>
            <div class="col-span-2 text-right">Actions</div>
        </div>

        <div class="flex-1 overflow-y-auto p-2 md:p-4 custom-scrollbar space-y-2" id="campaigns-list">
        </div>
    </div>
</div>
