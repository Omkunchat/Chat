<div id="catalog-wrapper" class="w-full max-w-7xl mx-auto space-y-4 animate-fade-in pb-24 relative">

    <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden mt-2">
        <div class="p-4 flex flex-row justify-between items-center">
            <div>
                <h2 class="text-lg font-black text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-box-open text-purple-600"></i> Product Catalog
                </h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">AI Knowledge Base & Inventory</p>
            </div>
            
            <div class="flex items-center gap-2">
                <span id="ai-training-status" class="hidden md:inline-flex items-center gap-1.5 px-3 py-2 bg-purple-50 text-purple-600 rounded-2xl border border-purple-100 text-[10px] font-black uppercase tracking-wider">
                    <i class="fa-solid fa-brain animate-pulse"></i> AI Synced
                </span>
                
                <a id="btn-add-product" href="#add-product" class="bg-slate-900 text-white px-5 py-2.5 rounded-2xl shadow-sm hover:bg-black active:scale-95 transition flex items-center gap-2">
                    <i class="fas fa-plus text-xs"></i> 
                    <span class="text-xs font-bold uppercase tracking-widest hidden md:inline">Add Product</span>
                    <span class="text-xs font-bold md:hidden">Add</span>
                </a>
            </div>
        </div>
        <div class="bg-purple-600 p-2.5 flex items-center gap-2">
            <span class="text-purple-100 text-[11px] font-bold uppercase tracking-wider italic ml-2">Every product added here is instantly learned by your AI Sales Agent.</span>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-1 bg-gradient-to-r from-purple-600 to-purple-800 p-6 rounded-[2rem] shadow-xl text-white relative overflow-hidden group">
            <div class="relative z-10">
                <p class="text-purple-200 text-[10px] font-black uppercase tracking-[0.2em] mb-2">Total Products</p>
                <h3 id="display-total-products" class="text-5xl font-black mb-4 tracking-tight">0</h3>
                <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-xl bg-white/10 backdrop-blur-md text-[10px] font-black uppercase tracking-widest text-purple-100 border border-white/10">
                    <i class="fas fa-store"></i> Active Live
                </div>
            </div>
            <i class="fa-solid fa-boxes-stacked absolute -right-6 -bottom-6 text-[120px] text-white/10 rotate-12 transition-transform group-hover:scale-110"></i>
        </div>

        <div class="md:col-span-1 bg-slate-900 p-6 rounded-[2rem] shadow-xl text-white relative overflow-hidden group">
            <div class="relative z-10">
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-2">Categories</p>
                <h3 id="display-categories" class="text-5xl font-black mb-4 tracking-tight text-blue-400">0</h3>
                <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-xl bg-blue-500/10 backdrop-blur-md text-[10px] font-black uppercase tracking-widest text-blue-400 border border-blue-500/20">
                    <i class="fas fa-tags"></i> Collections
                </div>
            </div>
            <i class="fa-solid fa-layer-group absolute -right-6 -bottom-6 text-[120px] text-white/5 -rotate-12 transition-transform group-hover:scale-110"></i>
        </div>

        <div class="md:col-span-1 bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm relative overflow-hidden group flex flex-col justify-between">
            <div>
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-2 flex items-center justify-between">
                    <span>AI Training Health</span>
                    <i class="fa-solid fa-check-circle text-emerald-500"></i>
                </p>
                <h3 class="text-3xl font-black text-slate-900 tracking-tight mt-1">100%</h3>
                <p class="text-xs font-bold text-slate-500 mt-1">Products Learned</p>
            </div>
            <div class="mt-4">
                <div class="w-full bg-slate-100 rounded-full h-2 mb-2 overflow-hidden border border-slate-50">
                    <div class="h-full bg-emerald-500 w-full transition-all duration-1000 shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div>
                </div>
                <p class="text-[9px] font-black text-slate-500 tracking-widest uppercase">AI is ready to sell all items</p>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-3xl border border-slate-200 shadow-sm flex flex-col min-h-[500px] overflow-hidden">
        
        <div class="p-4 border-b border-slate-100 flex flex-col md:flex-row gap-4 justify-between items-center bg-slate-50/30">
            <div class="relative w-full md:w-96">
                <i class="fas fa-search absolute left-4 top-3.5 text-slate-400 text-xs"></i>
                <input type="text" id="productSearchInput" onkeyup="window.handleProductSearch()" placeholder="SEARCH PRODUCT OR CATEGORY..." 
                    class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-[11px] font-black uppercase tracking-wider outline-none focus:border-purple-500 transition shadow-sm placeholder:text-slate-300">
            </div>
            
            <div class="flex gap-2 w-full md:w-auto">
                <select id="stockFilter" onchange="window.handleProductSearch()" class="w-full md:w-auto bg-white border border-slate-200 text-slate-600 text-[10px] font-black uppercase tracking-widest px-4 py-3 rounded-2xl outline-none focus:border-purple-500 cursor-pointer shadow-sm">
                    <option value="all">All Items</option>
                    <option value="in_stock">In Stock</option>
                    <option value="out_of_stock">Out of Stock</option>
                </select>
            </div>
        </div>
        
        <div class="flex-1 p-4 md:p-6 bg-slate-50/30">
            <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-400">
                    <i class="fas fa-circle-notch fa-spin text-3xl mb-4"></i>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Loading Catalog...</span>
                </div>
            </div>
        </div>
    </div>
</div>
