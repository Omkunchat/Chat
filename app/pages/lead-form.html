<div id="lead-form-wrapper" class="w-full max-w-7xl mx-auto space-y-4 animate-fade-in pb-24 relative md:px-4">

    <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden mt-2">
        <div class="p-3 md:p-4 flex flex-row justify-between items-center bg-slate-50/50 border-b border-slate-100">
            <div class="flex items-center gap-2 md:gap-4">
                <button onclick="window.location.hash='#leads'" class="w-8 h-8 md:w-10 md:h-10 rounded-xl md:rounded-2xl bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 flex items-center justify-center transition shadow-sm">
                    <i class="fa-solid fa-arrow-left text-[10px] md:text-xs"></i>
                </button>
                <div>
                    <h2 class="text-sm md:text-lg font-black text-slate-800" id="lf-page-title">Create New Lead</h2>
                    <p class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 whitespace-nowrap">Lead Workspace</p>
                </div>
            </div>
            
            <div class="lf-actions-container flex flex-row items-center gap-1 md:gap-3">
                <button onclick="window.handleDeleteLead()" id="btn-delete-lead" type="button" class="text-[10px] px-2 py-1.5 rounded-xl font-black uppercase tracking-widest text-red-500 bg-red-50 border border-red-100 hover:bg-red-500 hover:text-white transition-colors mr-1 md:mr-3 hidden">
                    <i class="fa-solid fa-trash"></i> <span class="hidden md:inline">Delete Lead</span>
                </button>
                <button onclick="document.getElementById('lead-full-form').dispatchEvent(new Event('submit'))" id="btn-save-full-lead" class="bg-blue-600 text-white px-4 md:px-8 py-2 md:py-3 rounded-xl md:rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition flex items-center gap-1.5 md:gap-2 whitespace-nowrap">
                    <i class="fas fa-save text-[10px] md:text-xs"></i> 
                    <span class="text-[10px] md:text-xs font-black uppercase tracking-widest">Save <span class="hidden md:inline">Record</span></span>
                </button>
            </div>
        </div>
    </div>

    <form id="lead-full-form" onsubmit="window.handleSaveFullLead(event)" class="grid grid-cols-1 lg:grid-cols-3 gap-3 md:gap-6 mt-4">
        <input type="hidden" id="lf-lead-id">

        <div class="lg:col-span-2 space-y-3 md:space-y-6">
            <div class="bg-white rounded-3xl md:rounded-[2rem] border border-slate-200 shadow-sm p-4 md:p-8">
                <h3 class="text-xs md:text-sm font-black text-slate-800 uppercase tracking-widest mb-4 md:mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-address-card text-slate-400"></i> Contact Information
                </h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-6 mb-3 md:mb-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-widest">Customer Name</label>
                        <input type="text" id="lf-name" required placeholder="E.g. Amit Kumar" 
                            class="w-full px-4 py-2.5 md:px-5 md:py-4 bg-slate-50 border border-slate-200 rounded-xl md:rounded-2xl font-black text-xs md:text-sm text-slate-800 outline-none focus:ring-2 focus:ring-blue-500 transition-all uppercase placeholder:text-slate-300">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-widest">Customer Phone (Mobile No.)</label>
                        <input type="tel" id="lf-phone" required placeholder="E.g. +91 9876543210" 
                            class="w-full px-4 py-2.5 md:px-5 md:py-4 bg-slate-50 border border-slate-200 rounded-xl md:rounded-2xl font-black text-xs md:text-sm text-slate-800 outline-none focus:ring-2 focus:ring-blue-500 transition-all placeholder:text-slate-300">
                    </div>
                </div>

                <div class="mb-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-widest">Business Category</label>
                    <select id="lf-category" class="w-full px-4 py-2.5 md:px-5 md:py-4 bg-slate-50 border border-slate-200 rounded-xl md:rounded-2xl font-black text-xs md:text-sm text-slate-800 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer">
                        <option value="clinic">Clinic / Healthcare</option>
                        <option value="salon">Salon / Spa</option>
                        <option value="realestate">Real Estate</option>
                        <option value="other">Other Business</option>
                    </select>
                </div>
                
                <div class="mt-3 md:mt-4">
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-widest">Shipping Address / Location</label>
                    <input type="text" id="lf-address" placeholder="E.g. Block C, Vasant Kunj, New Delhi" 
                        class="w-full px-4 py-2.5 md:px-5 md:py-4 bg-slate-50 border border-slate-200 rounded-xl md:rounded-2xl font-bold text-xs text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 transition-all placeholder:text-slate-300">
                </div>
            </div>

            <div class="bg-white rounded-3xl md:rounded-[2rem] border border-slate-200 shadow-sm p-4 md:p-8">
                <h3 class="text-xs md:text-sm font-black text-slate-800 uppercase tracking-widest mb-4 md:mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-briefcase text-slate-400"></i> Deal Details
                </h3>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-widest">Interested In (Product)</label>
                        <input type="text" id="lf-intent" placeholder="E.g. Red Nike Sneakers Size 10" 
                            class="w-full px-4 py-2.5 md:px-5 md:py-4 bg-slate-50 border border-slate-200 rounded-xl md:rounded-2xl font-bold text-xs text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 transition-all uppercase placeholder:text-slate-300">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-widest">Deal Value (₹)</label>
                        <input type="number" id="lf-value" placeholder="0" 
                            class="w-full px-4 py-2.5 md:px-5 md:py-4 bg-emerald-50 border border-emerald-100 rounded-xl md:rounded-2xl font-black text-xl text-emerald-700 outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                    </div>
                </div>
            </div>
        </div>

        <div class="space-y-3 md:space-y-6">
            <div class="bg-white rounded-3xl md:rounded-[2rem] border border-slate-200 shadow-sm p-3 md:p-6">
                <h3 class="text-xs md:text-sm font-black text-slate-800 uppercase tracking-widest mb-3 md:mb-4">Pipeline Status</h3>
                
                <div class="space-y-2.5 md:space-y-3">
                    <label class="flex items-center p-2.5 border border-slate-200 rounded-xl md:rounded-2xl cursor-pointer hover:bg-slate-50 transition peer-checked:border-blue-500">
                        <input type="radio" name="lf-status" value="new" class="w-3.5 h-3.5 text-blue-600 focus:ring-blue-500" checked>
                        <span class="ml-2.5 md:ml-3 text-[10px] md:text-xs font-black text-slate-700 uppercase tracking-widest">New Lead</span>
                    </label>
                    <label class="flex items-center p-2.5 border border-slate-200 rounded-xl md:rounded-2xl cursor-pointer hover:bg-orange-50 transition">
                        <input type="radio" name="lf-status" value="hot" class="w-3.5 h-3.5 text-orange-500 focus:ring-orange-500">
                        <span class="ml-2.5 md:ml-3 text-[10px] md:text-xs font-black text-slate-700 uppercase tracking-widest">Hot (Negotiating)</span>
                    </label>
                    <label class="flex items-center p-2.5 border border-slate-200 rounded-xl md:rounded-2xl cursor-pointer hover:bg-emerald-50 transition">
                        <input type="radio" name="lf-status" value="won" class="w-3.5 h-3.5 text-emerald-500 focus:ring-emerald-500">
                        <span class="ml-2.5 md:ml-3 text-[10px] md:text-xs font-black text-slate-700 uppercase tracking-widest whitespace-nowrap">Won (Order Placed)</span>
                    </label>
                    <label class="flex items-center p-2.5 border border-slate-200 rounded-xl md:rounded-2xl cursor-pointer hover:bg-slate-50 transition">
                        <input type="radio" name="lf-status" value="lost" class="w-3.5 h-3.5 text-slate-500 focus:ring-slate-500">
                        <span class="ml-2.5 md:ml-3 text-[10px] md:text-xs font-black text-slate-700 uppercase tracking-widest">Lost / Cancelled</span>
                    </label>
                </div>
            </div>

            <div class="bg-yellow-50 rounded-3xl md:rounded-[2rem] border border-yellow-100 shadow-sm p-3 md:p-6 relative overflow-hidden">
                <h3 class="text-xs md:text-sm font-black text-yellow-800 uppercase tracking-widest mb-3 md:mb-4 flex items-center gap-2 relative z-10">
                    <i class="fa-solid fa-sticky-note"></i> Internal Notes
                </h3>
                <textarea id="lf-notes" rows="4" placeholder="Write private notes here. Customer won't see this..." 
                    class="w-full px-3 md:px-4 py-2 md:py-3 bg-white/50 border border-yellow-200 rounded-xl font-medium text-[10px] md:text-xs text-slate-700 outline-none focus:ring-2 focus:ring-yellow-400 transition-all resize-none relative z-10 placeholder:text-slate-400"></textarea>
                <i class="fa-solid fa-pencil absolute -bottom-4 -right-4 text-6xl md:text-7xl text-yellow-200/50 -rotate-12"></i>
            </div>
        </div>
    </form>
</div>
