<div id="reviews-wrapper" class="space-y-6 animate-fade-in pb-24">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 class="text-2xl font-black text-slate-900 tracking-tight">Customer Reviews ⭐</h1>
            <p class="text-xs font-bold text-slate-400 mt-1 uppercase tracking-widest">AI Collected Feedback</p>
        </div>
        <button onclick="window.loadReviews()" class="px-5 py-2.5 bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 rounded-xl text-xs font-black uppercase tracking-widest shadow-sm transition active:scale-95 flex items-center justify-center gap-2">
            <i class="fa-solid fa-arrows-rotate"></i> Refresh Data
        </button>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="bg-gradient-to-br from-slate-900 to-slate-800 p-5 rounded-3xl shadow-md text-white">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Average Rating</p>
            <div class="flex items-baseline gap-2">
                <h3 class="text-3xl font-black text-white" id="stat-avg-rating">0.0</h3>
                <i class="fa-solid fa-star text-yellow-400 text-sm mb-1"></i>
            </div>
        </div>
        <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Reviews</p>
            <h3 class="text-3xl font-black text-slate-800" id="stat-total-reviews">0</h3>
        </div>
        <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm">
            <p class="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-1">Happy (4-5 Stars)</p>
            <h3 class="text-3xl font-black text-slate-800" id="stat-happy">0</h3>
        </div>
        <div class="bg-white p-5 rounded-3xl border border-red-100 shadow-sm">
            <p class="text-[10px] font-black text-red-500 uppercase tracking-widest mb-1">Critical (1-3 Stars)</p>
            <h3 class="text-3xl font-black text-red-600" id="stat-critical">0</h3>
        </div>
    </div>

    <div class="flex items-center justify-between bg-white rounded-2xl border border-slate-200 p-2 shadow-sm">
        <div class="flex items-center px-3">
            <i class="fa-solid fa-filter text-slate-400 mr-2 text-xs"></i>
            <span class="text-xs font-bold text-slate-600 uppercase tracking-widest">Filter:</span>
        </div>
        <select id="reviewFilter" onchange="window.filterReviews()" class="bg-slate-50 border-none outline-none text-xs font-black uppercase tracking-widest text-slate-700 py-2 px-4 rounded-xl cursor-pointer hover:bg-slate-100 transition">
            <option value="all">All Reviews</option>
            <option value="happy">⭐ 4 & 5 Stars (Happy)</option>
            <option value="critical">🚨 1 to 3 Stars (Critical)</option>
        </select>
    </div>

    <div id="reviews-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
    </div>
</div>
